<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juga I aprèn Jocs 15 Segons</title>
    <link rel="stylesheet" href="../css/jocs-15-segons.css">
</head>
<body id="jocs15segons">
    
    <div class="contenedor">
        <div class="groga-fond"></div>
    </div>

    <div class="botons">
        <a href="" class="flecha"></a>
    </div>

    <div class="groga-fond">
        <div class="juego-contenido">
            
            <div class="seccion-tiempo">
                <span class="numero-15" id="contador">15</span>
                <div class="icono-reloj"></div>
            </div>

            <div class="contenedor-tarjeta">
                <div class="tarjeta-blanca" id="pizarra"></div>
                <div class="boton-habitacio">
                    HABITACIÓ
                </div>
            </div>

            <div class="contenedor-input">
                <input type="text" placeholder="Escriu qualsevol cosa..." class="input-juego" id="entrada-texto">
            </div>

        </div>
    </div>

    <div class="barra">
        <ul>
            <li class="home"><a href="pg1home.html"></a></li>
            <li class="grups"></li>
            <li class="pannot"><a href="pg3panot.html"></a></li>
            <li class="recursos"><a href="pg4recursos.html"></a></li>
            <li class="perfil"><a href="pg5perfil.html"></a></li>
        </ul>
    </div>

    <script>
        const elementoContador = document.getElementById('contador');
        const entrada = document.getElementById('entrada-texto');
        const pizarra = document.getElementById('pizarra');
        let segundos = 15;

        // --- LÒGICA DEL COMPTE ENRERE ---
        const cuentaAtras = setInterval(() => {
            segundos--; 
            elementoContador.textContent = segundos;

            if (segundos <= 0) {
                clearInterval(cuentaAtras);
                elementoContador.textContent = "0";
                elementoContador.style.color = "red"; 
                
                // BLOQUEO DEL INPUT:
                entrada.disabled = true; // Ya no deja escribir
                entrada.placeholder = "Temps esgotat!"; // Cambia el mensaje
                entrada.style.backgroundColor = "#eeeeee"; // Se pone gris para indicar bloqueo
                
                // Efecto visual
                elementoContador.style.transform = "scale(1.1)";
                setTimeout(() => elementoContador.style.transform = "scale(1)", 100);
            }
        }, 1000);

        // --- LÒGICA ACUMULATIVA ---
        entrada.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const textoEscrito = entrada.value.trim();

                if (textoEscrito !== "") {
                    const nuevaPalabra = document.createElement('div');
                    nuevaPalabra.textContent = textoEscrito;
                    nuevaPalabra.className = 'palabra-acumulada';
                    
                    pizarra.appendChild(nuevaPalabra);
                    entrada.value = ""; 

                    pizarra.scrollTop = pizarra.scrollHeight;
                }
            }
        });
    </script>
</body>
</html>

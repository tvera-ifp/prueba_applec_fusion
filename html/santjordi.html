<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trobades Sant Jordi</title>
    <link rel="stylesheet" href="../css/santjordi.css">
</head>
<body id="sortidasantjordi">
    
    <div class="contenedor">
        <div class="blanc">
            <div class="header-image-container">
                <img src="../img/sant-jordi.png" alt="Sant Jordi" class="header-img">
                <h1 class="header-title">Sortida per Sant Jordi</h1>
            </div>

            <div class="info-content">
               
                <div class="info-item">
                    <img src="../img/icon-reloj.png" alt="Reloj" class="info-icon">
                    <div class="info-text">
                        <h3>Dia i hora</h3>
                        <p>Divendres, 09:00 h</p>
                    </div>
                </div>

                <div class="info-item">
                    <img src="../img/icon-ubi.png" alt="Ubicació" class="info-icon">
                    <div class="info-text">
                        <h3>Ubicació</h3>
                        <p>C/Passeig de Gràcia, 45</p>
                    </div>
                </div>

                <div class="section-container">
                    <div class="section-header">
                        <img src="../img/icon-persona.png" alt="Icon Persona" class="section-icon">
                        <h3>Coordinador</h3>
                    </div>
                    <div class="avatars">
                        <div class="avatar-item">
                            <div class="avatar-circle"><img src="../img/isaac.jpg" alt="Isaac"></div>
                            <span>Isaac B.</span>
                        </div>
                        <div class="avatar-item">
                            <div class="avatar-circle"><img src="../img/ona.jpg" alt="Ona"></div>
                            <span>Ona S.</span>
                        </div>
                    </div>
                </div>

                <div class="section-container">
                    <div class="section-header">
                        <img src="../img/icon-persona.png" alt="Icon Persona" class="section-icon">
                        <h3>Participants</h3>
                    </div>
                    <div class="avatars">
                        <div class="avatar-item">
                            <div class="avatar-circle"><img src="../img/andrea.jpg" alt="Andrea"></div>
                            <span>Andrea G.</span>
                        </div>
                        <div class="avatar-item">
                            <div class="avatar-circle"><img src="../img/julia.jpg" alt="Julia"></div>
                            <span>Julia T.</span>
                        </div>
                        <div class="avatar-item">
                            <div class="avatar-plus">+8</div>
                        </div>
                    </div>
                </div>
                <div class="button-container">
                    <button class="btn-inscriure">Inscriure's</button>
                </div>
            </div>
        </div>
    </div>

    <div class="botons">
        <a href="" class="flecha"></a>
    </div>

    <div class="barra">
        <ul>
            <li class="home"><a href="pg1home.html"></a></li>
            <li class="grups"></li>
            <li class="pannot"><a href="pg3panot.html"></a></li>
            <li class="recursos"><a href="pg4recursos.html"></a></li>
            <li class="perfil"><a href="pg5perfil.html"></a></li>
        </ul>
    </div>
</body>
</html>

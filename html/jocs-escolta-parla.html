<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juga I aprèn_Jocs Escolta I parla</title>
    <link rel="stylesheet" href="../css/jocs-escolta-parla.css">
</head>
<body id="jocs15segons">
    
    <div class="contenedor">
        <div class="groga-fond">
            <div class="zona-juego">
                <div class="tarjeta-blanca">
                    
                    <div class="contenedor-audio">
                        <img src="../img/icon-barra-sonido.png" alt="Ondas de sonido" class="img-ondas">
                    </div>
                    
                    <div class="controles-audio">
                        <img src="../img/icon-audio.png" alt="Play" class="icon-pausa" id="boton-control">
                        <img src="../img/icon-retroceso-sonido.png" alt="Repetir" class="icon-repetir">
                    </div>

                    <div class="contenedor-frase" id="texto-frase">
                        <p class="texto-juego">“La Laia surt a comprar amb la seva mare al mercat”</p>
                    </div>
                    
                </div>
            </div>
            
            <div class="seccion-grabacion">
                <div class="contenedor-microfono">
                    <img src="../img/icon-microfono.png" alt="Microfóno" class="icon-microfono">
                </div>
            </div>
        </div>
    </div>

    <div class="botons">
        <a href="" class="flecha"></a>
    </div>

    <div class="barra">
        <ul>
            <li class="home"><a href="pg1home.html"></a></li>
            <li class="grups"></li>
            <li class="pannot"><a href="pg3panot.html"></a></li>
            <li class="recursos"><a href="pg4recursos.html"></a></li>
            <li class="perfil"><a href="pg5perfil.html"></a></li>
        </ul>
    </div>

    <script>
        const botonControl = document.getElementById('boton-control');
        const contenedorFrase = document.getElementById('texto-frase');

        let estaReproduciendo = false;

        botonControl.addEventListener('click', function() {
            if (!estaReproduciendo) {
                // CAMBIO A ESTADO "REPRODUCIENDO" (Imagen 2)
                this.src = '../img/icon-pausa.png'; // Cambia a las barritas
                contenedorFrase.style.visibility = 'hidden'; // Oculta el texto
                estaReproduciendo = true;
            } else {
                // VOLVER AL ESTADO "INICIAL" (Imagen 1)
                this.src = '../img/icon-audio.png'; // Vuelve al icono play
                contenedorFrase.style.visibility = 'visible'; // Muestra el texto
                estaReproduciendo = false;
            }
        });
    </script>
</body>
</html>
